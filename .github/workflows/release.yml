name: Release Functional Json
on:
  workflow_dispatch:
    inputs:
      releaseVersion:
        description: 'release version'
        required: true
      nextVersion:
        description: 'next version'
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: '${{ secrets.PERSONAL_ACCESS_TOKEN }}'
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: oracle
      - name: release gradle
        run: |
          git config --local user.email "functional-json-github-actions@users.noreply.github.com"
          git config --local user.name "jfunctional-json-github-actions"
          ./gradlew release -Prelease.useAutomaticVersion=true -Prelease.releaseVersion=${{ github.event.inputs.releaseVersion }} -Prelease.newVersion=${{ github.event.inputs.nextVersion }}
      - name: Push tag
        run: |
          echo "created=true" >> "$GITHUB_OUTPUT"
          git push origin v${{ github.event.inputs.releaseVersion }}
#      - name: push tag
#        uses: ad-m/github-push-action@master
#        with:
#          branch: master
#          tags: true
#          github_token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
      - name: Create github release
        run: gh release create "v${{ github.event.inputs.releaseversion }}" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}